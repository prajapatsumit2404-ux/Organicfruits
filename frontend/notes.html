<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Notes - OG Organic Fruits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50">
  <!-- Navigation -->
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <i class="fas fa-leaf text-green-600 text-2xl"></i>
        <a href="index.html" class="text-2xl font-bold text-green-600">OrganicFruits</a>
      </div>

      <div class="flex items-center space-x-6">
        <a href="index.html" class="text-gray-700 hover:text-green-600">Home</a>
        <a href="shop.html" class="text-gray-700 hover:text-green-600">Shop</a>
        <a href="notes.html" class="text-green-600 font-semibold">My Notes</a>

        <div id="auth-buttons">
          <a href="login.html" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Login</a>
        </div>

        <div id="user-menu" class="hidden relative">
          <button onclick="toggleUserDropdown()" class="flex items-center gap-2 text-gray-700 hover:text-green-600">
            <i class="fas fa-user-circle text-2xl"></i>
            <span id="user-name" class="font-semibold"></span>
            <i class="fas fa-chevron-down text-xs"></i>
          </button>
          <div id="user-dropdown"
            class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 border border-gray-100 z-50">
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-green-700">
      <i class="fas fa-sticky-note mr-2"></i>My Notes
    </h1>

    <!-- Login Required Message -->
    <div id="login-required"
      class="hidden bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded mb-6">
      <i class="fas fa-exclamation-triangle mr-2"></i>
      Please <a href="login.html" class="underline font-semibold">login</a> to view and create notes.
    </div>

    <!-- Success Message -->
    <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6">
      <i class="fas fa-check-circle mr-2"></i>
      <span id="success-text"></span>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
      <i class="fas fa-exclamation-circle mr-2"></i>
      <span id="error-text"></span>
    </div>

    <div id="notes-content" class="hidden">
      <!-- Notes Container -->
      <div id="notes-container" class="space-y-4 mb-6">
        <!-- Notes will appear here -->
        <div class="text-center text-gray-500 py-8">
          <i class="fas fa-clipboard-list text-4xl mb-2"></i>
          <p>No notes yet. Create your first note below!</p>
        </div>
      </div>

      <!-- Note Form -->
      <form id="note-form" class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">
          <i class="fas fa-plus-circle mr-2"></i>Create New Note
        </h2>
        <div class="mb-4">
          <label class="block font-semibold mb-2 text-gray-700">Note Text</label>
          <textarea id="note-text" rows="4"
            class="w-full p-4 rounded-lg border-2 border-gray-200 focus:border-green-500 focus:outline-none"
            placeholder="Write your note here..." required></textarea>
        </div>
        <button type="submit"
          class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition">
          <i class="fas fa-save mr-2"></i>Save Note
        </button>
      </form>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    // API_URL is inherited from app.js

    // Get auth token from localStorage
    function getAuthToken() {
      return localStorage.getItem('token');
    }

    // Check if user is logged in
    function checkAuth() {
      const token = getAuthToken();
      if (!token) {
        document.getElementById('login-required').classList.remove('hidden');
        document.getElementById('notes-content').classList.add('hidden');
        return false;
      }
      document.getElementById('login-required').classList.add('hidden');
      document.getElementById('notes-content').classList.remove('hidden');
      return true;
    }

    // Load notes from backend
    async function loadNotes() {
      if (!checkAuth()) return;

      const token = getAuthToken();
      try {
        const res = await fetch(`${API_URL}/notes`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (res.status === 401) {
          showError('Session expired. Please login again.');
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          setTimeout(() => window.location.href = 'login.html', 2000);
          return;
        }

        const notes = await res.json();
        const container = document.getElementById('notes-container');

        if (notes.length === 0) {
          container.innerHTML = `
              <div class="text-center text-gray-500 py-8">
                <i class="fas fa-clipboard-list text-4xl mb-2"></i>
                <p>No notes yet. Create your first note below!</p>
              </div>
            `;
        } else {
          container.innerHTML = notes.map(n => `
              <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                <div class="flex justify-between items-start">
                  <div class="flex-1">
                    <p class="text-gray-800">${escapeHtml(n.text || '')}</p>
                    ${n.title ? `<p class="text-sm text-gray-500 mt-2"><strong>Title:</strong> ${escapeHtml(n.title)}</p>` : ''}
                    ${n.items && n.items.length > 0 ? `
                      <ul class="mt-2 ml-4 list-disc text-gray-700">
                        ${n.items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
                      </ul>
                    ` : ''}
                  </div>
                  <div class="text-xs text-gray-400 ml-4">
                    ${new Date(n.createdAt).toLocaleDateString()}
                  </div>
                </div>
              </div>
            `).join('');
        }
      } catch (e) {
        console.error('Error loading notes:', e);
        showError('Failed to load notes. Please try again.');
      }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Show success message
    function showSuccess(message) {
      const successMsg = document.getElementById('success-message');
      const successText = document.getElementById('success-text');
      successText.textContent = message;
      successMsg.classList.remove('hidden');
      setTimeout(() => successMsg.classList.add('hidden'), 3000);
    }

    // Show error message
    function showError(message) {
      const errorMsg = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      errorText.textContent = message;
      errorMsg.classList.remove('hidden');
      setTimeout(() => errorMsg.classList.add('hidden'), 5000);
    }

    // Handle form submission
    document.getElementById('note-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!checkAuth()) return;

      const text = document.getElementById('note-text').value.trim();
      if (!text) {
        showError('Please enter some text for your note.');
        return;
      }

      const token = getAuthToken();

      try {
        const res = await fetch(`${API_URL}/notes`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ text })
        });

        if (res.status === 401) {
          showError('Session expired. Please login again.');
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          setTimeout(() => window.location.href = 'login.html', 2000);
          return;
        }

        if (res.ok) {
          document.getElementById('note-text').value = '';
          showSuccess('Note saved successfully!');
          loadNotes();
        } else {
          const error = await res.json();
          showError(error.error || 'Failed to save note. Please try again.');
        }
      } catch (e) {
        console.error('Error saving note:', e);
        showError('Network error. Please check your connection and try again.');
      }
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      updateNav();
      loadNotes();
    });
  </script>
</body>

</html>
