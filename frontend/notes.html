<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notes - OG Organic Fruits</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-6">
      <h1 class="text-3xl font-bold mb-6">Notes</h1>
      <div id="notes-container" class="space-y-4">
        <!-- Notes will appear here -->
      </div>
      <form id="note-form" class="mt-6">
        <textarea id="note-text" rows="3" class="w-full p-4 rounded-lg border-2 border-gray-200"></textarea>
        <button class="mt-3 bg-green-600 text-white px-6 py-3 rounded-full font-bold">Save Note</button>
      </form>
    </div>

    <script>
      const API_URL = 'http://localhost:5000/api';
      async function loadNotes() {
        try {
          const res = await fetch(`${API_URL}/notes`);
          const notes = await res.json();
          const container = document.getElementById('notes-container');
          container.innerHTML = notes.map(n => `<div class="bg-white p-4 rounded-lg shadow">${n.text}</div>`).join('');
        } catch (e) { console.error(e); }
      }
      document.getElementById('note-form').addEventListener('submit', async (e) => { e.preventDefault(); const text = document.getElementById('note-text').value; try { await fetch(`${API_URL}/notes`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) }); document.getElementById('note-text').value = ''; loadNotes(); } catch (e) { console.error(e); } });
      document.addEventListener('DOMContentLoaded', loadNotes);
    </script>
  </body>
</html>
