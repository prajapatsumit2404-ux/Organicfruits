<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register - OG Organic Fruits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-gradient {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
  </style>
</head>

<body class="bg-gray-50">
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <i class="fas fa-leaf text-green-600 text-2xl"></i>
          <a href="index.html" class="text-2xl font-bold text-green-600">OrganicFruits</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen py-12 px-4 flex items-center justify-center">
    <div class="w-full max-w-4xl">
      <div class="grid md:grid-cols-2 gap-8 bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="auth-gradient text-white p-12 flex flex-col justify-center hidden md:flex">
          <h2 class="text-3xl font-bold mb-6">Freshness Delivered</h2>
          <p class="text-green-50 mb-8">Join our community of organic food lovers and get the freshest fruits delivered
            to your doorstep.</p>
          <ul class="space-y-4 text-green-50">
            <li><i class="fas fa-check mr-2"></i> 100% Organic Certified</li>
            <li><i class="fas fa-check mr-2"></i> Support Local Farmers</li>
            <li><i class="fas fa-check mr-2"></i> Freshness Guaranteed</li>
          </ul>
        </div>

        <div class="p-8 md:p-12">
          <div id="login-section">
            <h1 class="text-3xl font-bold mb-6 text-gray-900">Login</h1>
            <form id="login-form" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input id="login-email" type="email" placeholder="you@example.com"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  required />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input id="login-password" type="password" placeholder="••••••••"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  required />
              </div>
              <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-bold transition">Sign
                In</button>
            </form>
            <p class="mt-6 text-center text-gray-600">Don't have an account? <button onclick="toggleForms()"
                class="text-green-600 font-bold hover:underline">Register here</button></p>
          </div>

          <div id="register-section" class="hidden">
            <h1 class="text-3xl font-bold mb-6 text-gray-900">Sign Up</h1>
            <form id="register-form" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold mb-2">Full Name</label>
                <input id="reg-name" type="text" placeholder="John Doe"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  required />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input id="reg-email" type="email" placeholder="you@example.com"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  required />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input id="reg-password" type="password" placeholder="••••••••"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  required />
              </div>
              <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 font-bold transition">Create
                Account</button>
            </form>
            <p class="mt-6 text-center text-gray-600">Already have an account? <button onclick="toggleForms()"
                class="text-green-600 font-bold hover:underline">Login here</button></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
  <script>
    function toggleForms() {
      document.getElementById('login-section').classList.toggle('hidden');
      document.getElementById('register-section').classList.toggle('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      try {
        await window.login({ email, password });
        window.location.href = 'index.html';
      } catch (err) { alert(err.message); }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      try {
        await window.register({ name, email, password });
        window.location.href = 'index.html';
      } catch (err) { alert(err.message); }
    });
  </script>
</body>

</html>
