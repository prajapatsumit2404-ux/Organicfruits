version: '3.8'
services:
  backend:
    build:
      context: ./backend-java
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb+srv://username:password@cluster0.mongodb.net/organicfruits?retryWrites=true&w=majority
      - APP_JWT_SECRET=${JWT_SECRET:-your_very_long_random_secret_key_for_production_change_me}
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend